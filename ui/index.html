<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>QASR Test UI</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <main class="shell">
    <section class="hero">
      <p class="eyebrow">Qwen3-ASR CPU Test Console</p>
      <h1>离线上传与实时转写</h1>
      <p class="lede">本页只作联调。离线 WAV 优先在浏览器端分块转成 16k mono PCM 推送，实时走浏览器麦克风分块推送。</p>
      <div class="status-row">
        <span id="healthBadge" class="badge">检查中</span>
        <span id="runtimeHint" class="hint">服务未就绪</span>
      </div>
    </section>

    <section class="grid">
      <article class="panel">
        <header class="panel-head">
          <p class="panel-kicker">Offline</p>
          <h2>音频上传</h2>
        </header>
        <form id="uploadForm" class="stack">
          <label class="field">
            <span>WAV 文件</span>
            <input id="audioFile" type="file" accept=".wav,audio/wav">
          </label>
          <div class="button-row">
            <button id="offlineSubmit" class="action" type="submit">开始转写</button>
            <button id="offlineStop" class="ghost" type="button" disabled>停止</button>
          </div>
        </form>
        <p id="offlineStatus" class="hint"></p>
        <pre id="offlineResult" class="output">尚无结果</pre>
      </article>

      <article class="panel realtime">
        <header class="panel-head">
          <p class="panel-kicker">Realtime</p>
          <h2>实时转写</h2>
        </header>
        <div class="stack">
          <div class="button-row">
            <button id="startRealtime" class="action" type="button">启动</button>
            <button id="stopRealtime" class="ghost" type="button" disabled>停止</button>
            <button id="clearRealtime" class="ghost" type="button" style="display:none">清空</button>
          </div>
          <p id="realtimeStatus" class="hint">未开始</p>
          <pre id="realtimeResult" class="output">尚无结果</pre>
        </div>
      </article>
    </section>
  </main>
  <script src="/wav_stream_upload.js"></script>
  <script src="/app.js"></script>
</body>
</html>
